<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Phaser Template</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        /* Match VIEW.backgroundColor in src/config.ts so letterbox bars blend in. */
        background: #0e0f1a;
        overflow: hidden;
        /* The game owns all gestures — no browser pan/zoom on the canvas. */
        touch-action: none;
        overscroll-behavior: none;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
